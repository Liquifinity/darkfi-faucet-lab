name: Publication Safety

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run publication safety check
        run: cargo run --locked --bin publication-safety-check
